name: Build EspejoMIDI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install mido python-rtmidi pyinstaller
      - run: python -m PyInstaller --onefile --windowed --hidden-import=rtmidi --hidden-import=mido.backends.rtmidi --collect-all mido --name "EspejoMIDI" espejo.py
      - uses: actions/upload-artifact@v3
        with:
          name: EspejoMIDI
          path: dist/EspejoMIDI.exe
```

